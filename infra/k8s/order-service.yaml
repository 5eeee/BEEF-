apiVersion: v1
kind: Namespace
metadata:
  name: beefshteks
  labels:
    app.kubernetes.io/part-of: beefshteks

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: beefshteks
data:
  CATALOG_SERVICE_URL: "http://catalog-service:8001"
  PROMOTION_SERVICE_URL: "http://promotion-service:8008"
  DELIVERY_SERVICE_URL: "http://delivery-service:8006"
  PAYMENT_SERVICE_URL: "http://payment-service:8004"
  REDIS_URL: "redis://redis-master:6379/1"
  RABBITMQ_URL: "amqp://rabbitmq:5672/"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: order-service-secrets
  namespace: beefshteks
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://beefshteks:CHANGE_ME@postgres:5432/order_db"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: beefshteks
  labels:
    app: order-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: order-service
          image: ghcr.io/your-org/beefshteks/order-service:latest
          ports:
            - containerPort: 8003
              name: http
          envFrom:
            - configMapRef:
                name: order-service-config
            - secretRef:
                name: order-service-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: beefshteks
spec:
  selector:
    app: order-service
  ports:
    - port: 8003
      targetPort: 8003
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-hpa
  namespace: beefshteks
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: beefshteks-api
  namespace: beefshteks
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.beefshteks.ru
      secretName: beefshteks-api-tls
  rules:
    - host: api.beefshteks.ru
      http:
        paths:
          - path: /api/v1/cart
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8003
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8003
