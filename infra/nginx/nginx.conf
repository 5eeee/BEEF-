events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        client_max_body_size 20m;

        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        location /api/v1/categories {
            set $upstream catalog-service:8001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/products {
            set $upstream catalog-service:8001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/search {
            set $upstream catalog-service:8001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/admin/catalog {
            set $upstream catalog-service:8001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Admin-Key $http_x_admin_key;
        }

        location /api/v1/auth {
            set $upstream identity-service:8002;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/users {
            set $upstream identity-service:8002;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/cart {
            set $upstream order-service:8003;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/orders {
            set $upstream order-service:8003;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Session-Id $http_x_session_id;
            proxy_set_header X-User-Id $http_x_user_id;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/v1/admin/orders {
            set $upstream order-service:8003;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Admin-Key $http_x_admin_key;
        }

        location /api/v1/admin/stats {
            set $upstream order-service:8003;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Admin-Key $http_x_admin_key;
        }

        location /api/v1/payments {
            set $upstream payment-service:8004;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/notifications {
            set $upstream notification-service:8005;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/delivery {
            set $upstream delivery-service:8006;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/reviews {
            set $upstream content-service:8007;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/blog {
            set $upstream content-service:8007;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/pages {
            set $upstream content-service:8007;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/company {
            set $upstream content-service:8007;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/admin/reviews {
            set $upstream content-service:8007;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Admin-Key $http_x_admin_key;
        }

        location /api/v1/promo {
            set $upstream promotion-service:8008;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/admin/promo {
            set $upstream promotion-service:8008;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Admin-Key $http_x_admin_key;
        }

        location /api/v1/integration {
            set $upstream integration-service:8009;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        location /api/v1/media {
            set $upstream media-service:8010;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
        }

        # catalog admin catch-all under /api/v1/admin for products patch etc.
        location /api/v1/admin {
            set $upstream catalog-service:8001;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Admin-Key $http_x_admin_key;
        }
    }
}
