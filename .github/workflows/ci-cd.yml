name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: check services/

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Build without live API — pages that fetch at build use fallbacks
          API_PROXY_URL: http://127.0.0.1:9

  test:
    name: Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - order-service
          - payment-service
          - delivery-service
          - content-service
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beefshteks
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: beefshteks
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: pip install -r services/${{ matrix.service }}/requirements.txt
      - name: Run tests
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://beefshteks:changeme@localhost:5432/beefshteks
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests -v --tb=short

  docker:
    name: Docker build (${{ matrix.service }})
    needs: [lint-python, frontend, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          - catalog-service
          - identity-service
          - order-service
          - payment-service
          - content-service
          - delivery-service
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/beef-/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/beef-/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
