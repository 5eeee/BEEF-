[project]
name = "beefshteks-common"
version = "0.1.0"
description = "Shared schemas and events for Beefshteks microservices"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["beefshteks_common"]
